name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─── Lint & Type-check Frontend ─────────────────────────────
  ui-lint:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint .

  # ─── Lint & Type-check Backend ──────────────────────────────
  server-lint:
    name: Server Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema=src/prisma/schema
      - run: npx tsc --noEmit

  # ─── Build Frontend ────────────────────────────────────────
  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    needs: ui-lint
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 7

  # ─── Build Backend ─────────────────────────────────────────
  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    needs: server-lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema=src/prisma/schema
      - run: npm run build

  # ─── Security Audit ────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit server dependencies
        working-directory: server
        run: npm audit --audit-level=high || true
      - name: Audit UI dependencies
        working-directory: ui
        run: npm audit --audit-level=high || true

  # ─── Docker Build ──────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ui-build, server-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t crms-api:${{ github.sha }} ./server
      - name: Build UI image
        run: docker build -t crms-ui:${{ github.sha }} ./ui
